<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Stok Gudang Cloudflare</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen pb-20 antialiased">

  <script>
    // MASUKKAN API URL DARIPADA GOOGLE APPS SCRIPT DI SINI:
    const API_URL = "https://script.google.com/a/macros/cpp.co.id/s/AKfycbxQ7y40Vx_nzL3Doun0XLUw6UYuFdS_l_chMG7bDo0FsCuDSSR4HVGU94OfE7wLHXz9/exec"; 
  </script>

  <!-- LOGIN SECTION -->
  <div id="loginSection" class="flex flex-col justify-center min-h-screen p-6 max-w-sm mx-auto">
    <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100 text-center">
      <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4">??</div>
      <h1 class="text-xl font-extrabold text-slate-900">Gudang PPIC</h1>
      <p class="text-xs text-slate-400 mt-1 mb-6">Sistem Stok & Pengambilan Barang</p>

      <form onsubmit="handleLogin(event)" class="space-y-4 text-left">
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Username</label>
          <input type="text" id="username" required class="w-full bg-slate-50 border rounded-xl p-3 text-sm outline-none">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-600 mb-1">Password</label>
          <input type="password" id="password" required class="w-full bg-slate-50 border rounded-xl p-3 text-sm outline-none">
        </div>
        <button type="submit" id="btnLogin" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl text-sm shadow-lg shadow-blue-200">
          Masuk Akun
        </button>
      </form>
      <div id="loginError" class="hidden mt-4 p-3 bg-red-50 text-red-600 text-xs rounded-xl font-medium"></div>
    </div>
  </div>

  <!-- MAIN APP CONTAINER -->
  <div id="appSection" class="hidden max-w-md mx-auto min-h-screen flex flex-col">
    <header class="sticky top-0 z-40 bg-white/90 backdrop-blur-md px-5 py-4 border-b flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 bg-blue-600 text-white font-bold rounded-xl flex items-center justify-center text-sm" id="userAvatar">A</div>
        <div>
          <h2 class="text-sm font-bold text-slate-900" id="userNama">-</h2>
          <p class="text-[10px] text-slate-400"><span id="userRole" class="font-bold text-blue-600"></span> • <span id="userDept"></span></p>
        </div>
      </div>
      <button onclick="location.reload()" class="p-2 bg-slate-100 text-slate-500 rounded-xl text-xs font-semibold">?? Logout</button>
    </header>

    <main class="p-4 flex-1">
      <!-- TAB 1: STOK -->
      <div id="tabStok" class="space-y-4">
        <div class="bg-white p-4 rounded-2xl border shadow-sm flex justify-between items-center">
          <div>
            <p class="text-[11px] font-semibold text-slate-400">POSISI STOK</p>
            <p class="text-xs font-bold text-slate-800" id="txtTglStok">-</p>
          </div>
        </div>
        <div id="stokListContainer" class="space-y-2.5"></div>
      </div>

      <!-- TAB 2: FORM PENGAMBILAN MULTI ITEM -->
      <div id="tabAmbil" class="hidden space-y-4">
        <div class="bg-white p-5 rounded-2xl border shadow-sm">
          <h3 class="text-sm font-bold text-slate-900 mb-1">Form Pengambilan Barang</h3>
          <p class="text-xs text-slate-400 mb-4">Tambahkan barang yang ingin diambil dalam 1 pengajuan.</p>
          <div id="ambilRowContainer" class="space-y-3 mb-4"></div>
          <button type="button" onclick="addAmbilRow()" class="w-full bg-slate-100 text-slate-700 font-bold py-2.5 rounded-xl text-xs border mb-3">? Tambah Jenis Barang Lain</button>
          <button type="button" onclick="submitMultiPengambilan()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl text-sm">Kirim Pengajuan</button>
        </div>
      </div>

      <!-- TAB 3: INPUT PO (ADMIN) -->
      <div id="tabPO" class="hidden space-y-4">
        <div class="bg-white p-5 rounded-2xl border shadow-sm">
          <h3 class="text-sm font-bold text-slate-900 mb-1">Pengadaan Barang Masuk (PO)</h3>
          <div class="space-y-3 mb-4">
            <input type="text" id="poNomor" placeholder="Nomor PO" class="w-full bg-slate-50 border rounded-xl p-2.5 text-xs outline-none">
            <input type="date" id="poTanggal" class="w-full bg-slate-50 border rounded-xl p-2.5 text-xs outline-none">
          </div>
          <div id="poRowContainer" class="space-y-3 mb-3"></div>
          <button type="button" onclick="addPORow()" class="w-full bg-slate-100 text-slate-700 font-bold py-2.5 rounded-xl text-xs border mb-3">? Tambah Baris Barang PO</button>
          <button type="button" onclick="submitMultiPO()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl text-sm">Simpan Barang Masuk</button>
        </div>
      </div>
    </main>

    <!-- BOTTOM NAV -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t py-2 px-3 z-50">
      <div class="max-w-md mx-auto flex justify-around items-center">
        <button onclick="navSwitch('stok')" id="navStok" class="flex flex-col items-center text-blue-600 font-bold"><span>??</span><span class="text-[10px]">Stok</span></button>
        <button onclick="navSwitch('ambil')" id="navAmbil" class="flex flex-col items-center text-slate-400"><span>??</span><span class="text-[10px]">Ambil</span></button>
        <button onclick="navSwitch('po')" id="navPO" class="hidden flex-col items-center text-slate-400"><span>?</span><span class="text-[10px]">Input PO</span></button>
      </div>
    </nav>
  </div>

  <script>
    let currentUser = null;
    let masterStockList = [];

    function handleLogin(e) {
      e.preventDefault();
      const u = document.getElementById('username').value;
      const p = document.getElementById('password').value;

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "login", username: u, password: p })
      })
      .then(r => r.json())
      .then(res => {
        if (res.success) {
          currentUser = res.user;
          document.getElementById('loginSection').classList.add('hidden');
          document.getElementById('appSection').classList.remove('hidden');

          document.getElementById('userNama').textContent = currentUser.nama;
          document.getElementById('userRole').textContent = currentUser.role;
          document.getElementById('userDept').textContent = currentUser.dept;
          document.getElementById('userAvatar').textContent = currentUser.nama.charAt(0).toUpperCase();

          if (currentUser.role === 'ADMIN') {
            document.getElementById('navPO').classList.remove('hidden');
            document.getElementById('navPO').classList.add('flex');
          }

          loadStokData();
          addAmbilRow();
          addPORow();
        } else {
          document.getElementById('loginError').textContent = res.message;
          document.getElementById('loginError').classList.remove('hidden');
        }
      });
    }

    function navSwitch(tab) {
      document.getElementById('tabStok').classList.add('hidden');
      document.getElementById('tabAmbil').classList.add('hidden');
      document.getElementById('tabPO').classList.add('hidden');

      if (tab === 'stok') document.getElementById('tabStok').classList.remove('hidden');
      if (tab === 'ambil') document.getElementById('tabAmbil').classList.remove('hidden');
      if (tab === 'po') document.getElementById('tabPO').classList.remove('hidden');
    }

    function loadStokData() {
      fetch(`${API_URL}?action=getStok`)
      .then(r => r.json())
      .then(res => {
        masterStockList = res.items;
        document.getElementById('txtTglStok').textContent = res.tanggalReport;

        const container = document.getElementById('stokListContainer');
        container.innerHTML = '';

        res.items.forEach(item => {
          container.innerHTML += `
            <div class="bg-white p-4 rounded-2xl border shadow-sm flex justify-between items-center">
              <div>
                <p class="text-xs font-mono text-slate-400">${item.id}</p>
                <h4 class="text-sm font-bold text-slate-800">${item.nama}</h4>
                <p class="text-[11px] text-slate-400">${item.kategori} • Limit: ${item.kuota} ${item.satuan}/bln</p>
              </div>
              <div class="text-right">
                <span class="text-base font-extrabold ${item.stok <= 5 ? 'text-red-500' : 'text-slate-900'}">${item.stok}</span>
                <span class="text-[10px] text-slate-400 block">${item.satuan}</span>
              </div>
            </div>
          `;
        });
      });
    }

    function addAmbilRow() {
      const container = document.getElementById('ambilRowContainer');
      const rowId = 'ambilRow_' + Date.now();
      const div = document.createElement('div');
      div.id = rowId;
      div.className = 'flex items-center space-x-2 bg-slate-50 p-2 rounded-xl border';
      div.innerHTML = `
        <select class="ambil-select flex-1 bg-white border rounded-lg p-2 text-xs outline-none">${getBarangOptions()}</select>
        <input type="number" min="1" value="1" class="ambil-qty w-16 bg-white border rounded-lg p-2 text-xs text-center font-bold" placeholder="Qty">
        <button type="button" onclick="document.getElementById('${rowId}').remove()" class="text-red-500 font-bold px-2 py-1 text-xs">?</button>
      `;
      container.appendChild(div);
    }

    function addPORow() {
      const container = document.getElementById('poRowContainer');
      const rowId = 'poRow_' + Date.now();
      const div = document.createElement('div');
      div.id = rowId;
      div.className = 'flex items-center space-x-2 bg-slate-50 p-2 rounded-xl border';
      div.innerHTML = `
        <select class="po-select flex-1 bg-white border rounded-lg p-2 text-xs outline-none">${getBarangOptions()}</select>
        <input type="number" min="1" value="1" class="po-qty w-16 bg-white border rounded-lg p-2 text-xs text-center font-bold" placeholder="Qty">
        <button type="button" onclick="document.getElementById('${rowId}').remove()" class="text-red-500 font-bold px-2 py-1 text-xs">?</button>
      `;
      container.appendChild(div);
    }

    function getBarangOptions() {
      let opt = '<option value="">-- Pilih Barang --</option>';
      masterStockList.forEach(item => {
        opt += `<option value="${item.id}">${item.nama} (Stok: ${item.stok})</option>`;
      });
      return opt;
    }

    function submitMultiPengambilan() {
      const rows = document.querySelectorAll('#ambilRowContainer > div');
      let items = [];
      rows.forEach(row => {
        let id = row.querySelector('.ambil-select').value;
        let qty = row.querySelector('.ambil-qty').value;
        if (id && qty > 0) items.push({ idBarang: id, jumlah: qty });
      });

      if (items.length === 0) return alert("Pilih minimal 1 barang!");

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "submitPengambilan", username: currentUser.username, nama: currentUser.nama, dept: currentUser.dept, items: items })
      })
      .then(r => r.json())
      .then(res => {
        alert(res.message);
        if (res.success) {
          loadStokData();
          navSwitch('stok');
        }
      });
    }

    function submitMultiPO() {
      const poNo = document.getElementById('poNomor').value;
      const tgl = document.getElementById('poTanggal').value;
      const rows = document.querySelectorAll('#poRowContainer > div');
      let items = [];
      rows.forEach(row => {
        let id = row.querySelector('.po-select').value;
        let qty = row.querySelector('.po-qty').value;
        if (id && qty > 0) items.push({ idBarang: id, jumlah: qty });
      });

      if (!poNo || items.length === 0) return alert("Isi Nomor PO & minimal 1 barang!");

      fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "submitPO", noPO: poNo, tanggal: tgl, adminNama: currentUser.nama, items: items })
      })
      .then(r => r.json())
      .then(res => {
        alert(res.message);
        if (res.success) {
          loadStokData();
          navSwitch('stok');
        }
      });
    }
  </script>
</body>
</html>
